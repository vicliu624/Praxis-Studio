name: Publish Desktop

on:
  workflow_dispatch:
  push:
    tags:
      - "app-v*"

permissions:
  contents: write

jobs:
  publish-windows:
    name: Publish Windows desktop release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.19.0"
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./apps/studio-desktop/src-tauri -> target"

      - name: Install dependencies
        run: npm ci

      - name: Build workspace packages
        run: npm run build:packages

      - name: Build runtime CLI
        run: npm run build -w @praxis/runtime-cli

      - name: Build and publish Tauri release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/studio-desktop
          tauriScript: npx tauri
          tagName: app-v__VERSION__
          releaseName: Praxis Studio v__VERSION__
          releaseBody: "Desktop release for Praxis Studio. The attached latest.json is used by the in-app updater."
          releaseDraft: false
          prerelease: false
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true
